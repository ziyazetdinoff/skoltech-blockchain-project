services:
  hardhat:
    build:
      context: .
      dockerfile: Dockerfile
    image: dca-mvp-sepolia:latest
    working_dir: /app
    env_file:
      - .env
    environment:
      HOME: /app/.home
    command: npm run compile
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  executor:
    build:
      context: .
      dockerfile: Dockerfile
    image: dca-mvp-sepolia:latest
    working_dir: /app
    env_file:
      - .env
    environment:
      HOME: /app/.home
    command: npm run executor
    restart: unless-stopped
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: dca-mvp-sepolia:latest
    working_dir: /app
    env_file:
      - .env
    environment:
      HOME: /app/.home
    command: npm run bot
    restart: unless-stopped
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
